                        isPrivate: true
                        isPrivateUrl: true
                        mock_output:
                          enabled: false
                        skip: false
                        retry: {}
                    uuid: 6b6601a1-cc25-4d5b-9b27-460b562518bf
                    pretty_name: Check if Restore Plan is Enabled
                - name: custom-step:6.0.0
                  id: launch_restore_plan
                  env:
                    ACCESS_TOKEN: '{{ $.generate_access_token.api_object.access_token }}'
                    PLAN_ID: '{{ $.filter_plan_data.result.0.id }}'
                    RESTORE_LOCATION_ID: '{{ $.filter_recovery_locations_data.result.0.id }}'
                    RESTORE_POINT_DATE: '{{ $.parameter_selection.answers.user_input_rp_datetime }}'
