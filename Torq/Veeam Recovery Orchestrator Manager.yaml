                    disable: false
                manifestId: 3a3ad7b0-62a1-5a15-8939-afe7674596a2
                isPrivate: false
                mock_output:
                  enabled: false
                skip: false
                retry: {}
          - uuid: 3325c341-507c-43a1-9146-97b2c8016067
            steps:
              - name: custom-step:2.0.0
                id: list_recovery_locations
                env:
                  ACCESS_TOKEN: '{{ $.generate_access_token.api_object.access_token }}'
                  SKIP_SSL_VERIFICATION: "true"
                envFrom:
                  integrationRef: '{{
                    $.workflow_parameters.veeam_recovery_orchestrator_integration
                    }}'
                runner: '{{ $.workflow_parameters.runner_name }}'
                uuid: 639a2f4d-1722-49b7-8b6b-b649ce06152d
                pretty_name: List Recovery Locations
                options:
                  executor:
                    name: http_request_v_4_23_0
                    env: {}
                    sync: true
                    disable: false
                documentationUrl: https://helpcenter.veeam.com/docs/vro/rest/reference/vro-rest.html/?ver=7.2#tag/RecoveryLocations/operation/RecoveryLocations_GetRecoveryLocations
                manifestId: 140b9f2d-2d89-410d-b314-3b676b94d259
                isPrivate: true
                isPrivateUrl: true
                mock_output:
                  enabled: false
                skip: false
                retry: {}
              - name: us-docker.pkg.dev/stackpulse/public/jq/extract_to_sparse_object:3.6.0
                id: extract_recovery_location_fields
                env:
                  INPUT: '{{ $.list_recovery_locations.api_object.data }}'
                  PATHS: name,id
                uuid: 98c867ce-1c94-46ed-9bd2-75d0a73bdcda
                pretty_name: Extract Recovery Location Fields
                options:
                  executor:
                    name: utils_infrastructure_v_1_42_0
                    env: {}
                    sync: true
                    disable: false
                manifestId: 3a3ad7b0-62a1-5a15-8939-afe7674596a2
                isPrivate: false
                mock_output:
                  enabled: false
                skip: false
                retry: {}
    - name: us-docker.pkg.dev/stackpulse/public/interact/send_interaction:2.3.0
      id: parameter_selection
      env:
        CASE_ID: '{{ $.metadata.case.id }}'
        FLOW_SETTINGS: '{"name":"Interaction
          Flow","openToOrgSso":false,"allowedToCancelExecution":false,"cancelExecutionWhenTimedOut":true}'
        FORM_SCHEMA: '{ "parameters":
          [{"name":"parameter_1","type":"MARKDOWN_TEXT","prettyName":"Parameter
          1","value":"Select the Restore or Replication Plan to be
          executed.\n\nYou must select the Recovery Location for a restore.
          Optionally, an anti-virus scan can be performed. If a virus is found,
          the recovery is canceled.\n\n**IMPORTANT**\nOnly plans with the status
          \"Verified - All checks passed\" are
          executed.","uploadedFile":{},"allowMultipleFiles":true,"selectDisplayMode":"DROPDOWN_DISPLAY"},
          {"name":"user_input_plan","type":"SINGLE_SELECT","required":true,"prettyName":"Select
          Plan","description":"Select the Plan to execute","optionsList":{{
          $.list_orchestrator_plans.api_object.data.[*].name
          }},"value":"","uploadedFile":{},"selectDisplayMode":"DROPDOWN_DISPLAY"},
          {"name":"user_input_recovery_location","type":"SINGLE_SELECT","required":true,"prettyName":"Select
          Recovery Location (Restore Plan only)","description":"The Recovery
          Location to be used","optionsList":{{
          $.list_recovery_locations.api_object.data.[*].name }},"value":"{{
          jsonEscape $.list_recovery_locations.api_object.data.0.name
          }}","uploadedFile":{},"allowMultipleFiles":true,"selectDisplayMode":"DROPDOWN_DISPLAY"},
          {"name":"user_input_rp_datetime","type":"DATE","required":true,"prettyName":"Restore
          Point Date and Time","description":"Defines a restore point date and
          time to be used to perform the operation. Null value used to specify
          the latest restore point.","value":"{{ jsonEscape
          $.get_current_date_and_time.result
          }}","uploadedFile":{},"dateTimeStructure":"DATE_TIME","allowMultipleFiles":true,"selectDisplayMode":"DROPDOWN_DISPLAY"},
          {"name":"user_input_avscan","type":"BOOLEAN","required":true,"prettyName":"AV
          Scan (Restore Plan only)","description":"Defines whether to scan
          backup files for possible
          viruses.","value":"false","uploadedFile":{},"allowMultipleFiles":true,"selectDisplayMode":"DROPDOWN_DISPLAY"},
          {"name":"buttons","type":"BUTTONS","buttons":[{}]}]}'
        FORM_TITLE: Specify the Plan and Recovery Location
        HAS_NEXT: "true"
        TIMEOUT: 1m
      uuid: f1c6da3f-eee6-4968-bd76-4f80ad4a315a
      pretty_name: Parameter Selection
      options:
        executor:
          name: ""
          env: {}
          sync: false
          disable: false
      manifestId: 3e56af69-c229-5284-827f-bed81a8e62f6
      isPrivate: false
      mock_output:
        enabled: false
      skip: false
      retry: {}
    - name: us-docker.pkg.dev/stackpulse/public/utils/array_utils/array-filter:2.9.0
