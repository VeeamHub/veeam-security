      env:
        FIELD_PATH: name
        FILTER_ARG: '{{ $.parameter_selection.answers.user_input_recovery_location }}'
        FILTER_FUNC: Equals
        INPUT: '{{ $.extract_recovery_location_fields.result }}'
      uuid: 521fb116-598e-4f52-b62b-e649cfc96f9d
      pretty_name: Filter Recovery Locations Data
      options:
        executor:
          name: utils_infrastructure_v_1_62_0
          env: {}
          sync: true
          disable: false
      documentationUrl: https://learn.torq.io/docs/array-utilities#filter-array
      manifestId: f857ec6d-a6e5-5fe6-a679-709b834c533c
      isPrivate: false
      mock_output:
        enabled: false
      skip: false
      retry: {}
    - if:
        conditions:
          or:
            - and:
                - lvalue: '{{ $.filter_plan_data.result.0.planType }}'
                  operator: EQUALS
                  rvalue: Restore
        then:
          - if:
              conditions:
                or:
                  - and:
                      - lvalue: '{{ $.filter_plan_data.result.0.state }}'
                        operator: NOT_EQUALS
                        rvalue: RestoreComplete
                      - lvalue: '{{ $.filter_plan_data.result.0.planVerificationState }}'
                        operator: EQUALS
                        rvalue: Verified
              then:
                - if:
                    conditions:
                      or:
                        - and:
                            - lvalue: '{{ $.filter_plan_data.result.0.planMode }}'
                              operator: EQUALS
                              rvalue: enabled
                    then: []
                    else:
                      - name: custom-step:2.0.0
                        id: enable_orchestrator_plan_restore
                        env:
                          ACCESS_TOKEN: '{{ $.generate_access_token.api_object.access_token }}'
                          PLAN_ID: '{{ $.filter_plan_data.result.0.id }}'
                          SKIP_SSL_VERIFICATION: "true"
                        envFrom:
                          integrationRef: '{{
                            $.workflow_parameters.veeam_recovery_orchestrator_integration
                            }}'
                        runner: '{{ $.workflow_parameters.runner_name }}'
                        uuid: 8e66c84a-8db8-4bb3-ab7b-bc873bd8625c
                        pretty_name: Enable Orchestrator Plan - Restore
                        options:
                          executor:
                            name: http_request_v_4_23_0
