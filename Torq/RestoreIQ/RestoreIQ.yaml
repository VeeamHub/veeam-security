                    env: {}
                    sync: true
                    disable: false
                documentationUrl: https://helpcenter.veeam.com/docs/backup/vbr_rest/reference/vbr-rest-v1-2-rev0.html#tag/Malware-Detection/operation/ViewSuspiciousActivityEvents
