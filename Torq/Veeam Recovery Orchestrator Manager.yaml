        DATE: ""
        DATE_FORMAT_LAYOUT: 2006-01-02T15:04:05Z07:00
        TIME_AGO: ""
      uuid: 02e8b11f-3d15-4a4d-aade-f84fefaa0086
      pretty_name: Get Current Date and Time
      options:
        executor:
          name: utils_infrastructure_v_1_48_0
          env: {}
          sync: true
          disable: false
      documentationUrl: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      manifestId: 17315e0a-8c47-5c7c-b909-6624d7c5cf39
      isPrivate: false
      mock_output:
        enabled: false
      skip: false
      retry: {}
    - name: custom-step:2.0.0
