!!ExportedWorkflow
apiVersion: torq.io/v2alpha
kind: Workflow
id: 79ffda53-d204-487c-8789-163669a93ea7
name: Veeam Recovery Orchestrator Manager
trigger:
  interaction:
    finish_strategy: CONTINUE
    flow_timeout: 1m
    form_group:
      cancel_execution_when_timed_out: true
      name: Interaction Flow
      workflow_id: 885c6cda-35f7-454f-ad64-4d7c759e6dcb
    form_schema:
      parameters:
        - name: information
          pretty_name: Information
          select_display_mode: DROPDOWN_DISPLAY
          type: MARKDOWN_TEXT
          uploadedFile: {}
          value: "This workflow executes the Veeam Recovery Orchestrator Plan selected by
            the user.


            A date defines which recovery point should be used to perform the
            operation.\ 


            For Restore Plans the recovery location must be specified and,
            optionally, an antivirus scan can be performed. If a virus is found,
            the restore is canceled.


            Only plans that have successfully passed the readiness check are
            started otherwise the workflow is stopped.\n"
        - buttons:
            - text: Start
          name: user_action_button
          type: BUTTONS
    form_title: Veeam Recovery Orchestrator Automation
    show_in_sidebar: true
playbook:
  description: |
    This workflow offers the possibility to execute a Recovery Orchestrator Restore Plan or a Replica Plan Failover.
    The last restore point / the last replica is used during execution.
  steps:
    - name: us-docker.pkg.dev/stackpulse/public/utils/parameters_utils/workflow_parameters:1.5.0
      id: workflow_parameters
      env:
        SCHEMA: |-
          {
              "veeam_recovery_orchestrator_integration": {
                  "type": 17,
                  "prettyName": "Veeam Recovery Orchestrator Integration",
                  "description": "",
                  "uiPlaceholder": "",
                  "integration": {
                      "defaultValue": "",
                      "vendor": "veeam_recovery_orchestrator_token"
                  }
              },
              "runner_name": {
                  "type": 8,
                  "prettyName": "Runner Name",
                  "description": "The name of the local Torq Runner to perform Veeam Recovery Orchestrator steps.",
                  "uiPlaceholder": ""
              }
          }
        VALUES: |-
          {
            "veeam_recovery_orchestrator_integration": "vro_instance",
            "runner_name": "veeam_env"
          }
      uuid: 460a2b97-5f37-4b3f-9030-1b3b86e3dc32
      pretty_name: Workflow Parameters
      options:
        executor:
          name: utils_workflow_parameters_v_1_3_0
          env: {}
          sync: true
          disable: false
      manifestId: e77cae6e-fb7b-52bb-b970-6798296b076d
      isPrivate: false
      mock_output:
        enabled: false
      skip: false
      retry: {}
    - name: us-docker.pkg.dev/stackpulse/public/utils/date_and_time_utils/get-date:4.7.0
      id: get_current_date_and_time
