        INPUT: '{{ $.extract_plan_data_fields.result }}'
      runner: veeam_env
      uuid: 306224b9-1a0f-44bb-b19c-56ad9da87ee1
      pretty_name: Filter Plan Data
      options:
        executor:
          name: utils_infrastructure_v_1_62_0
          env: {}
          sync: true
          disable: false
      documentationUrl: https://learn.torq.io/docs/array-utilities#filter-array
      manifestId: f857ec6d-a6e5-5fe6-a679-709b834c533c
      isPrivate: false
      mock_output:
        enabled: false
      skip: false
      retry: {}
    - name: us-docker.pkg.dev/stackpulse/public/utils/array_utils/array-filter:2.9.0
